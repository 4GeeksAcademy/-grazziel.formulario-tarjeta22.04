<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- FORMULARIO DE PAGO SOLO CON BOOTSTRAP -->
<div class="container my-5">
    <!-- Este div es el contenedor principal de Bootstrap.
         "container" centra el contenido y le da márgenes laterales automáticos.
         "my-5" añade margen vertical (arriba y abajo) para que el formulario respire. -->

    <div class="row justify-content-center">
        <!-- "row" crea una fila del sistema de grid de Bootstrap.
             "justify-content-center" centra horizontalmente las columnas dentro de esta fila. -->

        <div class="col-md-8 col-lg-6">
            <!-- Esta es la columna donde va el formulario.
                 En pantallas medianas (md) ocupa 8 columnas.
                 En pantallas grandes (lg) ocupa 6 columnas.
                 Esto hace que el formulario no sea demasiado ancho y se vea más profesional. -->

                <div class="card">

                    <h4 class="card-header mb-4">Formulario de pago</h4>

                    <div class="card-body">
                        <div class="alert alert-danger mb-4" role="alert">
                            Algunos campos están incompletos.
                        </div>


                        <!-- FILA: Card # / CVC # / Amount -->
                        <div class="row mb-3">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label class="form-label">Tarjeta #</label>
                                <input type="text" class="form-control" placeholder="XXXXXXXXXXXXXXXX">
                            </div>
                            <div class="col-md-3 mb-3 mb-md-0">
                                <label class="form-label">CVC #</label>
                                <input type="text" class="form-control" placeholder="0000">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Importe</label>
                                <div class="input-group">
                                    <span class="input-group-text">$</span>
                                    <input type="text" class="form-control" placeholder="Amount">
                                </div>
                            </div>
                        </div>

                        <!-- FILA: First Name / Last Name -->
                        <div class="row mb-3">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label class="form-label">Nombre</label>
                                <input type="text" class="form-control" placeholder="Nombre">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Apellido</label>
                                <input type="text" class="form-control" placeholder="Apellido">
                            </div>
                        </div>

                        <!-- FILA: City / State / Postal Code -->
                        <div class="row mb-3">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label class="form-label">Ciudad</label>
                                <input type="text" class="form-control" placeholder="Ciudad">
                            </div>

                            <div class="col-md-3 mb-3 mb-md-0">
                                <label class="form-label">Lugar</label>
                                <select class="form-select">
                                    <option selected>Selecciona un lugar</option>
                                    <option>maravilloso 1</option>
                                    <option>magnifico 2</option>
                                    <option>estupendo 3</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">codigo postal</label>
                                <input type="text" class="form-control" placeholder="codigo postal">
                            </div>
                        </div>

                        <!-- Selector de tarjetas -->
                        <div class="mb-3">
                            <label class="form-label d-block">Aceptamos:</label>

                            <div class="d-flex gap-3">

                                <!-- VISA -->
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="cardType" id="visa">
                                    <label class="form-check-label fs-3" for="visa">
                                        <i class="bi bi-credit-card"></i>
                                    </label>
                                </div>

                                <!-- MASTERCARD -->
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="cardType" id="mastercard">
                                    <label class="form-check-label fs-3" for="mastercard">
                                        <i class="bi bi-credit-card-2-front"></i>
                                    </label>
                                </div>

                                <!-- AMEX -->
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="cardType" id="amex">
                                    <label class="form-check-label fs-3" for="amex">
                                        <i class="bi bi-wallet2"></i>
                                    </label>
                                </div>

                                <!-- PAYPAL -->
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="cardType" id="paypal">
                                    <label class="form-check-label fs-3" for="paypal">
                                        <i class="bi bi-bank"></i>
                                    </label>
                                </div>

                            </div>
                        </div>
                        <!-- MENSAJE -->
                        <div class="mb-4">
                            <label class="form-label">MENSAJE</label>
                            <textarea class="form-control" rows="3" placeholder="Añade cualquier nota aquí."></textarea>
                        </div>

                        <!-- BOTONES -->

                    </div>
                    <div class=" card-footer d-flex justify-content-end gap-2">
                        <button type="button" class="btn btn-secondary">Cancelar</button>
                        <button type="button" class="btn btn-primary">Enviar</button>
                    </div>
                </div>

            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
